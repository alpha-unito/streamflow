#!/usr/bin/env streamflow
version: v1.0
workflows:
  master:
    type: cwl
    config:
      file: cwl/main.cwl
      settings: cwl/config.yml
    bindings:
      - step: /compile
        target:
          deployment: helm-mpi
          service: openmpi
      - step: /execute
        target:
          deployment: helm-mpi
          locations: 2
          service: openmpi
deployments:
  helm-mpi:
    type: helm
    config:
      chart: environment/helm/openmpi
      releaseName: openmpi-rel
    workdir: /tmp
